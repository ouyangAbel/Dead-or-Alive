<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#0f0a18"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#ff1744"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g stroke="#e63946" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Open book icon -->
  <g transform="translate(140,130)">
    <path d="M90,0 L0,20 L0,160 L90,140 Z" fill="none" stroke="#e63946" stroke-width="2" opacity="0.5"/>
    <path d="M90,0 L180,20 L180,160 L90,140 Z" fill="none" stroke="#e63946" stroke-width="2" opacity="0.5"/>
    <line x1="90" y1="0" x2="90" y2="140" stroke="#e63946" stroke-width="1.5" opacity="0.4"/>
    <line x1="20" y1="40" x2="75" y2="30" stroke="#555" stroke-width="1" opacity="0.3"/>
    <line x1="20" y1="60" x2="75" y2="50" stroke="#555" stroke-width="1" opacity="0.25"/>
    <line x1="20" y1="80" x2="75" y2="70" stroke="#555" stroke-width="1" opacity="0.2"/>
    <line x1="105" y1="30" x2="160" y2="40" stroke="#555" stroke-width="1" opacity="0.3"/>
    <line x1="105" y1="50" x2="160" y2="60" stroke="#555" stroke-width="1" opacity="0.25"/>
    <line x1="105" y1="70" x2="160" y2="80" stroke="#555" stroke-width="1" opacity="0.2"/>
    <text x="90" y="185" font-family="Rajdhani,sans-serif" font-size="12" fill="#00f0ff" text-anchor="middle" letter-spacing="3">WIKI</text>
  </g>
  <!-- Search/magnifying glass -->
  <g transform="translate(400,160)">
    <circle cx="35" cy="35" r="30" fill="none" stroke="#00f0ff" stroke-width="2.5" opacity="0.4"/>
    <line x1="57" y1="57" x2="80" y2="80" stroke="#00f0ff" stroke-width="3" opacity="0.35"/>
    <text x="35" y="40" font-family="Orbitron,sans-serif" font-size="14" font-weight="700" fill="#00f0ff" text-anchor="middle" opacity="0.5">?</text>
  </g>
  <!-- Data/knowledge nodes -->
  <g transform="translate(560,120)">
    <rect x="0" y="0" width="120" height="40" rx="4" fill="none" stroke="#e63946" stroke-width="1.5" opacity="0.3"/>
    <text x="60" y="26" font-family="Rajdhani,sans-serif" font-size="12" fill="#e63946" text-anchor="middle" opacity="0.5" letter-spacing="1">CHARACTERS</text>
    <rect x="140" y="0" width="120" height="40" rx="4" fill="none" stroke="#e63946" stroke-width="1.5" opacity="0.3"/>
    <text x="200" y="26" font-family="Rajdhani,sans-serif" font-size="12" fill="#e63946" text-anchor="middle" opacity="0.5" letter-spacing="1">MECHANICS</text>
    <rect x="280" y="0" width="120" height="40" rx="4" fill="none" stroke="#e63946" stroke-width="1.5" opacity="0.3"/>
    <text x="340" y="26" font-family="Rajdhani,sans-serif" font-size="12" fill="#e63946" text-anchor="middle" opacity="0.5" letter-spacing="1">COMBOS</text>
    <rect x="70" y="55" width="120" height="40" rx="4" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.3"/>
    <text x="130" y="81" font-family="Rajdhani,sans-serif" font-size="12" fill="#00f0ff" text-anchor="middle" opacity="0.5" letter-spacing="1">FRAME DATA</text>
    <rect x="210" y="55" width="120" height="40" rx="4" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.3"/>
    <text x="270" y="81" font-family="Rajdhani,sans-serif" font-size="12" fill="#00f0ff" text-anchor="middle" opacity="0.5" letter-spacing="1">STAGES</text>
    <!-- connecting lines -->
    <line x1="60" y1="40" x2="130" y2="55" stroke="#555" stroke-width="1" opacity="0.15"/>
    <line x1="200" y1="40" x2="130" y2="55" stroke="#555" stroke-width="1" opacity="0.15"/>
    <line x1="340" y1="40" x2="270" y2="55" stroke="#555" stroke-width="1" opacity="0.15"/>
    <line x1="200" y1="40" x2="270" y2="55" stroke="#555" stroke-width="1" opacity="0.15"/>
  </g>
  <!-- Main title -->
  <text x="600" y="390" font-family="Orbitron,sans-serif" font-size="38" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="2">DEAD OR ALIVE 6</text>
  <text x="600" y="440" font-family="Orbitron,sans-serif" font-size="28" font-weight="700" fill="#e63946" text-anchor="middle" letter-spacing="6">LAST ROUND</text>
  <text x="600" y="485" font-family="Rajdhani,sans-serif" font-size="22" fill="#00f0ff" text-anchor="middle" letter-spacing="8">COMPLETE WIKI GUIDE</text>
  <line x1="200" y1="520" x2="1000" y2="520" stroke="url(#red)" stroke-width="2" opacity="0.3"/>
  <text x="600" y="570" font-family="Exo 2,sans-serif" font-size="16" fill="#888" text-anchor="middle">Characters | Mechanics | Stages | Frame Data | Strategies | 2026</text>
</svg>
