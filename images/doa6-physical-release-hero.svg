<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#150a10"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#ff1744"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g stroke="#e63946" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Game case icon -->
  <g transform="translate(160,120)">
    <rect x="0" y="0" width="140" height="190" rx="6" fill="none" stroke="#e63946" stroke-width="3" opacity="0.7"/>
    <rect x="8" y="8" width="124" height="174" rx="3" fill="#e63946" opacity="0.06"/>
    <rect x="20" y="30" width="100" height="60" rx="2" fill="#e63946" opacity="0.1"/>
    <text x="70" y="65" font-family="Orbitron,sans-serif" font-size="14" font-weight="900" fill="#e63946" text-anchor="middle" opacity="0.8">DOA6</text>
    <rect x="20" y="110" width="100" height="4" rx="2" fill="#555" opacity="0.3"/>
    <rect x="20" y="125" width="70" height="4" rx="2" fill="#555" opacity="0.2"/>
    <rect x="20" y="140" width="85" height="4" rx="2" fill="#555" opacity="0.2"/>
    <text x="70" y="175" font-family="Rajdhani,sans-serif" font-size="11" fill="#00f0ff" text-anchor="middle" letter-spacing="2">PHYSICAL</text>
  </g>
  <!-- Disc icon -->
  <g transform="translate(420,165)">
    <circle cx="50" cy="50" r="48" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.4"/>
    <circle cx="50" cy="50" r="30" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.25"/>
    <circle cx="50" cy="50" r="10" fill="#00f0ff" opacity="0.15"/>
    <text x="50" y="55" font-family="Orbitron,sans-serif" font-size="10" font-weight="700" fill="#00f0ff" text-anchor="middle" opacity="0.6">DVD</text>
  </g>
  <!-- Plus sign -->
  <g transform="translate(540,195)">
    <line x1="0" y1="20" x2="40" y2="20" stroke="#e63946" stroke-width="2" opacity="0.4"/>
    <line x1="20" y1="0" x2="20" y2="40" stroke="#e63946" stroke-width="2" opacity="0.4"/>
  </g>
  <!-- Box contents icon -->
  <g transform="translate(620,130)">
    <rect x="0" y="30" width="160" height="120" rx="4" fill="none" stroke="#e63946" stroke-width="2" opacity="0.4"/>
    <line x1="0" y1="30" x2="80" y2="0" stroke="#e63946" stroke-width="2" opacity="0.3"/>
    <line x1="160" y1="30" x2="80" y2="0" stroke="#e63946" stroke-width="2" opacity="0.3"/>
    <line x1="80" y1="0" x2="80" y2="30" stroke="#e63946" stroke-width="1.5" opacity="0.25"/>
    <text x="80" y="80" font-family="Orbitron,sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="0.5">COLLECTOR</text>
    <text x="80" y="100" font-family="Orbitron,sans-serif" font-size="12" font-weight="700" fill="#e63946" text-anchor="middle" opacity="0.6">EDITION</text>
    <text x="80" y="130" font-family="Rajdhani,sans-serif" font-size="11" fill="#00f0ff" text-anchor="middle" letter-spacing="1">ALL DLC INCLUDED</text>
  </g>
  <!-- Price tag -->
  <g transform="translate(880,155)">
    <circle cx="30" cy="15" r="8" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.4"/>
    <rect x="5" y="30" width="120" height="60" rx="4" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.35"/>
    <text x="65" y="60" font-family="Orbitron,sans-serif" font-size="18" font-weight="900" fill="#00f0ff" text-anchor="middle" opacity="0.7">$49.99</text>
    <text x="65" y="80" font-family="Rajdhani,sans-serif" font-size="11" fill="#e63946" text-anchor="middle" letter-spacing="2">MSRP</text>
  </g>
  <!-- Main title -->
  <text x="600" y="400" font-family="Orbitron,sans-serif" font-size="38" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="2">DEAD OR ALIVE 6</text>
  <text x="600" y="450" font-family="Orbitron,sans-serif" font-size="28" font-weight="700" fill="#e63946" text-anchor="middle" letter-spacing="6">LAST ROUND</text>
  <text x="600" y="495" font-family="Rajdhani,sans-serif" font-size="22" fill="#00f0ff" text-anchor="middle" letter-spacing="8">PHYSICAL RELEASE GUIDE</text>
  <line x1="200" y1="530" x2="1000" y2="530" stroke="url(#red)" stroke-width="2" opacity="0.3"/>
  <text x="600" y="580" font-family="Exo 2,sans-serif" font-size="16" fill="#888" text-anchor="middle">Editions Compared | Where to Buy | What is in the Box | 2026</text>
</svg>
