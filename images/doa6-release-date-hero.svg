<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#1a0a15"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#ff1744"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#00b8d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#e63946" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Calendar icon -->
  <g transform="translate(120,140)">
    <rect x="0" y="30" width="180" height="150" rx="8" fill="none" stroke="#e63946" stroke-width="3" opacity="0.6"/>
    <line x1="0" y1="70" x2="180" y2="70" stroke="#e63946" stroke-width="3" opacity="0.6"/>
    <rect x="30" y="10" width="12" height="40" rx="4" fill="#e63946" opacity="0.8"/>
    <rect x="138" y="10" width="12" height="40" rx="4" fill="#e63946" opacity="0.8"/>
    <text x="90" y="125" font-family="Orbitron,sans-serif" font-size="48" font-weight="900" fill="#e63946" text-anchor="middle">2019</text>
    <text x="90" y="155" font-family="Rajdhani,sans-serif" font-size="18" fill="#00f0ff" text-anchor="middle" letter-spacing="4">MAR 1</text>
  </g>
  <!-- Arrow pointing right -->
  <g transform="translate(340,200)">
    <line x1="0" y1="0" x2="140" y2="0" stroke="#00f0ff" stroke-width="2" opacity="0.5"/>
    <polygon points="140,-10 170,0 140,10" fill="#00f0ff" opacity="0.5"/>
  </g>
  <!-- Star/burst icon for Last Round -->
  <g transform="translate(560,130)">
    <circle cx="80" cy="80" r="70" fill="none" stroke="url(#red)" stroke-width="3" opacity="0.4"/>
    <circle cx="80" cy="80" r="50" fill="none" stroke="url(#red)" stroke-width="2" opacity="0.3"/>
    <text x="80" y="65" font-family="Orbitron,sans-serif" font-size="16" font-weight="700" fill="#e63946" text-anchor="middle" letter-spacing="3">LAST</text>
    <text x="80" y="95" font-family="Orbitron,sans-serif" font-size="16" font-weight="700" fill="#e63946" text-anchor="middle" letter-spacing="3">ROUND</text>
    <text x="80" y="125" font-family="Rajdhani,sans-serif" font-size="14" fill="#00f0ff" text-anchor="middle" letter-spacing="2">DEFINITIVE</text>
  </g>
  <!-- Arrow to Switch 2 -->
  <g transform="translate(700,200)">
    <line x1="0" y1="0" x2="120" y2="0" stroke="#00f0ff" stroke-width="2" opacity="0.5"/>
    <polygon points="120,-10 150,0 120,10" fill="#00f0ff" opacity="0.5"/>
  </g>
  <!-- Switch 2 icon -->
  <g transform="translate(880,145)">
    <rect x="0" y="0" width="160" height="120" rx="12" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.5"/>
    <rect x="15" y="20" width="130" height="80" rx="4" fill="#00f0ff" opacity="0.08"/>
    <text x="80" y="60" font-family="Orbitron,sans-serif" font-size="14" font-weight="700" fill="#00f0ff" text-anchor="middle" letter-spacing="2">SWITCH</text>
    <text x="80" y="85" font-family="Orbitron,sans-serif" font-size="24" font-weight="900" fill="#00f0ff" text-anchor="middle">2</text>
    <text x="80" y="110" font-family="Rajdhani,sans-serif" font-size="13" fill="#e63946" text-anchor="middle" letter-spacing="2">2026</text>
  </g>
  <!-- Title text -->
  <text x="600" y="400" font-family="Orbitron,sans-serif" font-size="38" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="2">DEAD OR ALIVE 6</text>
  <text x="600" y="450" font-family="Orbitron,sans-serif" font-size="28" font-weight="700" fill="#e63946" text-anchor="middle" letter-spacing="6">LAST ROUND</text>
  <text x="600" y="495" font-family="Rajdhani,sans-serif" font-size="22" fill="#00f0ff" text-anchor="middle" letter-spacing="8">RELEASE DATE TIMELINE</text>
  <!-- Bottom line -->
  <line x1="200" y1="530" x2="1000" y2="530" stroke="url(#red)" stroke-width="2" opacity="0.3"/>
  <text x="600" y="580" font-family="Exo 2,sans-serif" font-size="16" fill="#888" text-anchor="middle">Complete Platform Guide | Every Version Explained | 2026 Update</text>
</svg>
